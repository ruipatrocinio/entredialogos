{{ define "main"}}
<div class="container py-5"> <div class="mx-xl-5 px-xl-5">
    
    <div class="text-center mb-5">
      <h1 class="mb-4 display-7">{{.Site.Params.contacts.title}}</h1>
      <h5 class="fw-light mb-2">
        {{.Site.Params.contacts.formCallToAction }}
      </h5>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 mb-3">
        <div class="card mx-auto p-1 p-md-4 bg-light shadow-sm border-0">
          <div class="card-body bg-light">
            <form id="contact-form" role="form" action="{{ .Site.Params.contacts.form.formspreeLink}}" method="POST">
              <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
              <div class="controls">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <div class="form-group">
                      <label class="form-label" for="form_name">{{.Site.Params.contacts.form.firstname}}</label>
                      <input id="form_name" type="text" name="name" class="form-control" placeholder="{{.Site.Params.contacts.form.firstname}}" required="required">
                    </div>
                  </div>
                  <div class="col-md-6 mb-3">
                    <div class="form-group">
                      <label class="form-label" for="form_lastname">{{.Site.Params.contacts.form.lastname}}</label>
                      <input id="form_lastname" type="text" name="surname" class="form-control" placeholder="{{.Site.Params.contacts.form.lastname}}" required="required">
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <div class="form-group">
                    <label class="form-label" for="form_email">{{.Site.Params.contacts.form.email}}</label>
                    <input id="form_email" type="email" name="email" class="form-control" placeholder="{{.Site.Params.contacts.form.email}}" required="required">
                  </div>
                </div>

                <div class="mb-3">
                  <div class="form-group">
                    <label class="form-label" for="form_phone">{{.Site.Params.contacts.form.phone}}</label>
                    <input id="form_phone" type="tel" name="phone-number" class="form-control" placeholder="{{.Site.Params.contacts.form.phone}}" required="required">
                  </div>
                </div>

                <div class="mb-3">
                  <div class="form-group">
                    <label class="form-label" for="form_message">{{.Site.Params.contacts.form.inquiry}}</label>
                    <textarea id="form_message" name="message" class="form-control" rows="4" required="required"></textarea>
                  </div>
                </div>

                <div class="mb-4 form-check">
                  <input type="checkbox" class="form-check-input" id="exampleCheck1" name="consent" required="required">
                  <label class="form-check-label small text-muted" for="exampleCheck1">
                    {{.Site.Params.contacts.form.checkbox}}
                  </label>
                </div>

                <div class="d-grid"> <input type="submit" class="btn btn-primary py-3 fw-bold" value="{{.Site.Params.contacts.form.submitBtn}}">
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      {{ if .Site.Params.schedules.enabledContacts}}
      <div class="col-lg-4 mb-3">
        <div class="card h-100 p-4 shadow-sm border-0">
          <div class="card-body text-center">
            <i class="display-4 bi-clock text-muted mb-3 d-block"></i>
            <h5 class="text-muted border-bottom pb-2 mb-4">
              {{.Site.Params.schedules.title}}
            </h5>
            <div class="schedule-list">
              {{range .Site.Params.schedules.days}}
                {{if . }}<p class="text-muted mb-2">{{.}}</p>{{end}}
              {{end}}
            </div>
          </div>
        </div>
      </div>
      {{end}}

    </div>
  </div>
</div>
{{ end }}
